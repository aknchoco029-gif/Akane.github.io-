<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>私のホームページ</title>
    <style>
        /* ページ全体の隙間（余白）をゼロにする設定 */
        body {
            margin: 0;
            padding: 0;
            font-family: sans-serif;
        }

        /* ① 写真を画面いっぱいに表示する設定 */
        .main-visual {
            width: 100%;
            height: 100vh; /* 💡ここがポイント！画面の縦幅ぴったりにする命令です */
        }

        .main-visual img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 💡写真の比率を崩さずに、画面いっぱいに広げます */
        }

        /* ② スクロールした後に見えるコンテンツの設定 */
        .content-area {
            padding: 60px 20px;
            text-align: center;
            background-color: #ffffff;
        }
        
        .content-area p {
            font-size: 18px;
            line-height: 1.8;
        }
    </style>
</head>
<body>

    <div class="main-visual">
        <img src="my-photo.jpg" alt="メインの写真">
    <
    </div>

</body>
